<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>
<div style="text-align:center; padding:40px; min-height:100vh;">

  <h1 style="margin-bottom:10px;">🎨 Color Palette Generator</h1>
  <p style="color:#666;">Click to generate modern color palettes</p>

  <button onclick="generateColors()" 
    style="padding:12px 24px; font-size:16px; margin:20px; cursor:pointer; border:none; border-radius:8px; background:#333; color:white;">
    Generate Colors
  </button>

  <div id="colors" style="display:flex; justify-content:center; gap:15px; margin-top:30px; flex-wrap:wrap;"></div>

</div>
 <h1 style="font-family: Arial; text-align:center; margin-top:40px;">
  🎨 Color Palette Generator
</h1>

  <button onclick="generateColors(style="padding:12px 24px; font-size:16px; margin:20px; cursor:pointer; border:none; border-radius:8px; background:#333; color:white; transition:0.2s;"" 
style="padding:10px 20px; font-size:16px; cursor:pointer; display:block; margin:auto;">
Generate Colors
</button>

  <div id="colors" style="display:flex; gap:10px; margin-top:20px;"></div>

  <script>
    function generateColors() {
      const container = document.getElementById("colors");
      container.innerHTML = "";

      for (let i = 0; i < 5; i++) {
        const color = "#" + Math.floor(Math.random()*16777215).toString(16);

        const box = document.createElement("div");
        box.style.width = "120px";
box.style.height = "120px";
box.style.background = color;
box.style.borderRadius = "12px";
box.style.boxShadow = "0 4px 10px rgba(0,0,0,0.15)";
box.style.fontSize = "14px";
box.style.fontWeight = "bold";
box.style.cursor = "pointer";
        box.innerText = color;
        box.style.color = "white";
        box.style.display = "flex";
        box.style.alignItems = "center";
        box.style.justifyContent = "center";

        container.appendChild(box);box.onclick = function () {
  navigator.clipboard.writeText(color);
  box.innerText = color + " ✓";
setTimeout(() => {
  box.innerText = color;
}, 800);
};
      }
    }
  </script>
</body>
</html>
