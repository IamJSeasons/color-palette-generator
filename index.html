<!DOCTYPE html>
<html>
<head>
  <title>Color Palette Generator</title>
</head>
<body>
 <h1 style="font-family: Arial; text-align:center; margin-top:40px;">
  🎨 Color Palette Generator
</h1>

  <button onclick="generateColors()" 
style="padding:10px 20px; font-size:16px; cursor:pointer; display:block; margin:auto;">
Generate Colors
</button>

  <div id="colors" style="display:flex; gap:10px; margin-top:20px;"></div>

  <script>
    function generateColors() {
      const container = document.getElementById("colors");
      container.innerHTML = "";

      for (let i = 0; i < 5; i++) {
        const color = "#" + Math.floor(Math.random()*16777215).toString(16);

        const box = document.createElement("div");
        box.style.width = "100px";
        box.style.height = "100px";
        box.style.background = color;
        box.innerText = color;
        box.style.color = "white";
        box.style.display = "flex";
        box.style.alignItems = "center";
        box.style.justifyContent = "center";

        container.appendChild(box);
      }
    }
  </script>
</body>
</html>
